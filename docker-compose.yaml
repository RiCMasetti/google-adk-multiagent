services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - WEBUI_NAME=Multi Agent Crew
      # GOOGLE OAuth
      - ENABLE_OAUTH_SIGNUP=true
      - OAUTH_MERGE_ACCOUNTS_BY_EMAIL=true
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - OAUTH_ALLOWED_DOMAINS=${OAUTH_ALLOWED_DOMAINS}
      # Optional but recommended
      - OAUTH_PROVIDER_NAME=Google
      - DEFAULT_USER_ROLE=user
      # Hardening
      - WEBUI_AUTH=true
      - ENABLE_SIGNUP=true
    volumes:
      - open-webui:/app/backend/data
      - ./openwebui-brand/logo.png:/app/backend/open_webui/static/logo.png
      - ./openwebui-brand/favicon.png:/app/backend/open_webui/static/favicon.png
    networks:
      - platform
  pipeilnes:
    image: ghcr.io/open-webui/pipelines:main
    ports:
      - "9099:9099"
    volumes:
      - pipelines:/app/pipelines
      - ./openweb-pipe/agent-pipeline.py:/app/pipelines/agent-pipeline.py:ro
    networks:
      - platform

  postgres:
    image: postgres:16-alpine
    container_name: platform-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-adk_sessions}
      POSTGRES_USER: ${POSTGRES_USER:-adk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-adk} -d ${POSTGRES_DB:-adk_sessions}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - platform

  platform-agent:
    build:
      context: ./adk
      dockerfile: Dockerfile
    container_name: platform_agent
    ports:
      - "8000:8000"
    volumes:
      - ./credentials:/app/credentials:ro
      - ~/.aws:/root/.aws:ro
      - ~/certs:/opt/aws-signin-helper:ro
      - ./reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - GOOGLE_GENAI_USE_VERTEXAI=${GOOGLE_GENAI_USE_VERTEXAI}
      - GOOGLE_CLOUD_PROJECT=${GOOGLE_CLOUD_PROJECT}
      - GOOGLE_CLOUD_LOCATION=${GOOGLE_CLOUD_LOCATION}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - LLM_PROVIDER=${LLM_PROVIDER:-bedrock}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
      - ORCHESTRATOR_MODEL=${ORCHESTRATOR_MODEL:-}
      - SUB_AGENT_MODEL=${SUB_AGENT_MODEL:-}
      - FALLBACK_REGIONS=europe-west4,europe-west9,europe-west3,europe-central1
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID:-eu.anthropic.claude-sonnet-4-6}
      - AWS_BEARER_TOKEN_BEDROCK=${AWS_BEARER_TOKEN_BEDROCK:-}
      - AWS_PROFILE=${AWS_PROFILE}
      - AWS_ACCOUNT_ALIASES=${AWS_ACCOUNT_ALIASES}
      - AWS_REGION_NAME=${AWS_REGION_NAME:-eu-central-1}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-eu-central-1}
      - HETZNER_TOKEN=${HETZNER_TOKEN}
      - REPORTS_DIR=/app/reports
      - AGENT_REPORTS_DIR=/app/reports
      - AGENT_BASE_DIR=/app
      - PYTHONPATH=/app
      # Rate limiting: seconds between LLM calls (increase if hitting 429s)
      - LLM_CALL_DELAY=${LLM_CALL_DELAY:-3.0}
      # Retry on 429: max attempts, initial delay, max delay, backoff factor
      - LLM_RETRY_MAX_ATTEMPTS=${LLM_RETRY_MAX_ATTEMPTS:-6}
      - LLM_RETRY_INITIAL_DELAY=${LLM_RETRY_INITIAL_DELAY:-10.0}
      - LLM_RETRY_MAX_DELAY=${LLM_RETRY_MAX_DELAY:-120.0}
      - LLM_RETRY_BACKOFF_FACTOR=${LLM_RETRY_BACKOFF_FACTOR:-2.0}
      # Resource limits — LLM tool calls can be resource-intensive
      - ADK_SESSION_DB_URL=postgresql+asyncpg://${POSTGRES_USER:-adk}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-adk_sessions}
      - LITELLM_LOG=DEBUG
      # Prompt/history compaction before LLM calls. The DB session remains intact.
      - ENABLE_HISTORY_COMPACTION=${ENABLE_HISTORY_COMPACTION:-true}
      - MAX_LLM_HISTORY_CONTENTS=${MAX_LLM_HISTORY_CONTENTS:-32}
      - MAX_LLM_HISTORY_CHARS=${MAX_LLM_HISTORY_CHARS:-120000}
    networks:
      - platform
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    restart: unless-stopped

volumes:
  open-webui:
  pipelines:
  postgres-data:

networks:
  platform:
    driver: bridge
